# render.yaml — Orbit Infrastructure as Code
# One-click deploy: connect this repo to Render and it provisions everything.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ─────────────────────────────────────────────────────────
  # Web Service — Flask app served via Gunicorn + Docker
  # ─────────────────────────────────────────────────────────
  - type: web
    name: orbit-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter # upgrade to standard for production traffic
    healthCheckPath: /
    autoDeploy: true # auto-deploys on every push to main

    envVars:
      # Render injects DATABASE_URL automatically when linked to a DB
      - key: DATABASE_URL
        fromDatabase:
          name: orbit-db
          property: connectionString

      - key: FLASK_SECRET_KEY
        generateValue: true # Render generates a secure random value

      - key: ANTHROPIC_API_KEY
        sync: false # Set manually in Render dashboard

      - key: VAULT_PATH
        value: /app/vault

      # Optional: Pinecone vector store
      - key: PINECONE_API_KEY
        sync: false # Set manually in Render dashboard

      - key: PINECONE_INDEX_NAME
        value: orbit-vault

    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 80
      targetCPUPercent: 80

  # ─────────────────────────────────────────────────────────
  # Cron Job — Nightly Pinecone vault sync (2 AM ET)
  # ─────────────────────────────────────────────────────────
  - type: cron
    name: orbit-vault-sync
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 7 * * *" # 2 AM ET = 7 AM UTC
    command: python bot/ingest_to_pinecone.py
    plan: starter

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orbit-db
          property: connectionString

      - key: PINECONE_API_KEY
        sync: false

      - key: PINECONE_INDEX_NAME
        value: orbit-vault

      - key: VAULT_PATH
        value: /app/vault

# ─────────────────────────────────────────────────────────
# Managed PostgreSQL Database
# ─────────────────────────────────────────────────────────
databases:
  - name: orbit-db
    databaseName: orbit
    plan: starter # 1 GB storage, 97 MB RAM — upgrade as needed
    region: us-east-1 # Match your web service region
    postgresMajorVersion: 16 # Latest stable PostgreSQL
